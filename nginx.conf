server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # O mime.types padrão do Nginx não conhece a extensão .mjs (só .js) e cai em
    # application/octet-stream — o navegador recusa carregar como módulo ES nesse caso
    # (era o caso do worker do pdf.js). Força o Content-Type certo só pra esses arquivos.
    location ~* \.mjs$ {
        default_type application/javascript;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}